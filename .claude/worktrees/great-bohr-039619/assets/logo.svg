<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Orange-to-gold gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <!-- Dark blue gradient -->
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <!-- White to light blue -->
    <linearGradient id="lightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#c8ddf0"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="#0d1b2a"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Abstract antibody: minimalist Y constructed from geometric shapes -->
  <!-- Left arm -->
  <line x1="148" y1="120" x2="220" y2="230" stroke="url(#lightGrad)" stroke-width="14" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Right arm -->
  <line x1="364" y1="120" x2="292" y2="230" stroke="url(#lightGrad)" stroke-width="14" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Stem -->
  <line x1="256" y1="230" x2="256" y2="380" stroke="url(#lightGrad)" stroke-width="14" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Junction node -->
  <circle cx="256" cy="232" r="12" fill="#FFFFFF" filter="url(#softGlow)"/>

  <!-- Lightning bolt / spark cutting through the Y -->
  <g filter="url(#strongGlow)">
    <path d="M 270 80 L 238 210 L 275 200 L 245 320 L 280 310 L 256 420 L 272 295 L 240 305 L 268 195 L 232 205 L 270 80"
          fill="url(#accentGrad)" opacity="0.95"/>
  </g>

  <!-- Small spark accents -->
  <g filter="url(#softGlow)" opacity="0.8">
    <!-- Spark lines radiating from lightning -->
    <line x1="230" y1="160" x2="195" y2="140" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
    <line x1="285" y1="155" x2="320" y2="135" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
    <line x1="225" y1="270" x2="190" y2="265" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
    <line x1="290" y1="265" x2="325" y2="255" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>

    <!-- Dot sparks -->
    <circle cx="185" cy="135" r="3" fill="#FFD700"/>
    <circle cx="330" cy="130" r="2.5" fill="#FFD700"/>
    <circle cx="180" cy="260" r="2" fill="#FFD700"/>
    <circle cx="335" cy="250" r="2" fill="#FFD700"/>
    <circle cx="260" cy="78" r="3" fill="#FFFFFF"/>
    <circle cx="258" cy="425" r="2.5" fill="#FF6B00"/>
  </g>

  <!-- Binding site dots (antigen-binding regions) -->
  <circle cx="142" cy="114" r="8" fill="url(#accentGrad)" filter="url(#softGlow)"/>
  <circle cx="370" cy="114" r="8" fill="url(#accentGrad)" filter="url(#softGlow)"/>

  <!-- Text -->
  <text x="256" y="478" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="48" font-weight="700" letter-spacing="4">
    <tspan fill="#FF6B00">Ig</tspan><tspan fill="#FFFFFF" font-weight="400">N</tspan><tspan fill="#8eabc4" font-weight="300">ition</tspan>
  </text>
</svg>
